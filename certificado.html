<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificación de Certificado</title>

<script>
function getParam(nombre) {
    const url = new URL(window.location.href);
    return url.searchParams.get(nombre);
}
</script>

</head>

<body>

<h2>GTAA - CAPACITACIÓN </h2>

<p><b>Nombre completo:</b> <span id="nombre"></span></p>
<p><b>Curso:</b> <span id="curso"></span></p>
<p><b>Certificado:</b> Certificado de Asistencia</p>
<p><b>Fecha de emisión:</b> 13 de mayo del 2026</p>

<h3 style="color:green;">✔ Verificado</h3>

<script>
document.getElementById("nombre").innerText = getParam("nombre");
document.getElementById("curso").innerText = getParam("curso");
</script>

</body>
</html>
